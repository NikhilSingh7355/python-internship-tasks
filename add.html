{% extends "base.html" %}
{% block content %}
<h1>Add New Student</h1>
<div class="card">
  <form method="POST" action="/add">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="e.g. Rahul Sharma" required>
    </div>
    <div class="form-group">
      <label>Age</label>
      <input type="text" name="age" placeholder="e.g. 20" required>
    </div>
    <div class="form-group">
      <label>Grade</label>
      <input type="text" name="grade" placeholder="e.g. A, B+, First Year" required>
    </div>
    <div class="form-group">
      <label>Course</label>
      <input type="text" name="course" placeholder="e.g. Python, Web Dev, Data Science" required>
    </div>
    <div style="display:flex; gap:10px; margin-top:8px;">
      <button type="submit" class="btn btn-primary">Add Student</button>
      <a href="/" class="btn btn-gray">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
