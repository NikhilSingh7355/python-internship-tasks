<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Manager — Nikhil Singh</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    nav { background: #1e293b; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; }
    nav .brand { font-size: 18px; font-weight: 600; color: #38bdf8; }
    nav .brand span { color: #94a3b8; font-size: 13px; font-weight: 400; margin-left: 8px; }
    nav .links a { color: #94a3b8; text-decoration: none; margin-left: 20px; font-size: 14px; transition: color .2s; }
    nav .links a:hover { color: #e2e8f0; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    .flash { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
    .flash.success { background: #052e16; border: 1px solid #16a34a; color: #4ade80; }
    .flash.error   { background: #2d0a0a; border: 1px solid #dc2626; color: #f87171; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 24px; color: #f1f5f9; }
    h2 { font-size: 18px; font-weight: 500; margin-bottom: 16px; color: #cbd5e1; }
    .btn { display: inline-block; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; text-decoration: none; border: none; cursor: pointer; transition: opacity .2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-success { background: #22c55e; color: #0f172a; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-gray    { background: #334155; color: #e2e8f0; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; }
    th { background: #0f172a; padding: 12px 16px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: #64748b; }
    td { padding: 13px 16px; font-size: 14px; border-top: 1px solid #334155; }
    tr:hover td { background: #263044; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; background: #0c4a6e; color: #38bdf8; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input[type=text], input[type=number], select {
      width: 100%; padding: 10px 14px; background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 14px; outline: none; transition: border .2s;
    }
    input:focus, select:focus { border-color: #38bdf8; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 28px; max-width: 480px; }
    .search-bar { display: flex; gap: 10px; margin-bottom: 24px; }
    .search-bar input { flex: 1; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 20px; text-align: center; }
    .stat-card .num { font-size: 32px; font-weight: 700; color: #38bdf8; }
    .stat-card .lbl { font-size: 13px; color: #64748b; margin-top: 4px; }
    .empty { text-align: center; padding: 48px; color: #475569; font-size: 15px; }
  </style>
</head>
<body>
  <nav>
    <div class="brand">🎓 Student Manager <span>NJ-KABGLTK</span></div>
    <div class="links">
      <a href="/">All Students</a>
      <a href="/add">Add Student</a>
      <a href="/summary">Summary</a>
    </div>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
